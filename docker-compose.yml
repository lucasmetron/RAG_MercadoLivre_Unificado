services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - huggingface-cache:/app/.cache/huggingface
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  huggingface-cache:
